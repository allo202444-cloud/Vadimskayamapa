<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Адмінка - Final Fixed</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }
        #map { height: 100vh; width: 100vw; background: #000; z-index: 1; }
        .ui-element { position: absolute; z-index: 2000; transition: opacity 0.3s; }
        .bottom-left-btns { bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .round-btn { width: 45px; height: 45px; color: white; border: 2px solid #fff; border-radius: 50%; font-weight: 900; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-a { background: #ff0000; }
        .btn-theme { background: #222; border-color: #aaa; }
        .btn-settings { background: #444; font-size: 24px; }
        
        .settings-panel { top: 10px; left: 10px; width: 200px; max-height: 70vh; background: rgba(0,0,0,0.95); padding: 10px; border-radius: 8px; border: 1px solid #fff; color: white; display: none; overflow-y: auto; z-index: 3000; }
        .controls-panel { top: 10px; right: 10px; width: 150px; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 8px; border: 1px solid #ff0000; display: flex; flex-direction: column; gap: 6px; }
        .hidden { opacity: 0; pointer-events: none; }
        .settings-panel.active { display: block; }
        
        .btn { background: #1a1a1a; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 10px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; width: 100%; }
        .btn img { width: 18px; height: 18px; }
        .btn.active { background: #ff0000; border-color: #fff; }
        .setting-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 11px; border-bottom: 1px solid #222; padding-bottom: 3px; }
        .all-ukraine-btn { background: #ff0000; border: none; color: white; padding: 6px; width: 100%; border-radius: 4px; margin-bottom: 10px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .unit-icon { display: block; pointer-events: none; width: 30px !important; height: 30px !important; }
    </style>
</head>
<body>

    <div class="bottom-left-btns ui-element" id="leftBtns">
        <button class="round-btn btn-a" onclick="toggleUI()">A</button>
        <button class="round-btn btn-theme" id="themeBtn" onclick="toggleMapTheme()">🌙</button>
        <button class="round-btn btn-settings" onclick="toggleSettings()">⚙️</button>
    </div>

    <div class="settings-panel ui-element" id="settingsMenu">
        <h5 style="margin: 0 0 8px 0; color: #ff0000; font-size: 12px; text-align: center;">ОБЛАСТІ</h5>
        <button class="all-ukraine-btn" onclick="toggleAllUkraine()">Вся Україна</button>
        <div id="regionsList"></div>
    </div>

    <div class="controls-panel ui-element" id="mainUI">
        <button class="btn" id="btn-shahed" onclick="setActiveMode('shahed', 's1.png', 185)"><img src="s1.png"> ШАХЕД</button>
        <button class="btn" id="btn-scout" onclick="setActiveMode('scout', 'orl10.png', 120)"><img src="orl10.png"> РОЗВІДНИК</button>
        <button class="btn" id="btn-kab" onclick="setActiveMode('kab', 'kab.png', 700)"><img src="kab.png"> КАБ</button>
        <hr style="width:100%; border:0; border-top:1px solid #ff0000; margin: 3px 0; opacity: 0.5;">
        <button class="btn" id="btn-gromady" onclick="toggleGromadaDetection()">🌐 ГРОМАДИ: OFF</button>
        <hr style="width:100%; border:0; border-top:1px solid #ff0000; margin: 3px 0; opacity: 0.5;">
        <button class="btn" style="color: #ff4444;" id="btn-delete" onclick="setActiveMode('delete_one')">ВИДАЛИТИ</button>
        <button class="btn" style="color: #ff4444;" onclick="clearAllData()">ОЧИСТИТИ ВСЕ</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://map-objects-75fa0-default-rtdb.europe-west1.firebasedatabase.app/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const lightLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

        const map = L.map('map', { attributionControl: false, layers: [lightLayer] }).setView([48.30, 34.84], 6);

        // --- ЛІНІЯ ФРОНТУ (DEEPSTATE) ---
        let deepStateLayer;
        fetch('deepstatemap_data_20260221.json').then(res => res.json()).then(data => {
            deepStateLayer = L.geoJson(data, {
                style: { color: "transparent", fillColor: "#ff0000", fillOpacity: 0.4, interactive: false }
            }).addTo(map);
        });

        // Перемикач теми + приховання DeepState
        let isDarkMode = false;
        window.toggleMapTheme = () => {
            isDarkMode = !isDarkMode;
            const btn = document.getElementById('themeBtn');
            if (isDarkMode) { 
                map.removeLayer(lightLayer); 
                darkLayer.addTo(map); 
                btn.innerText = "☀️";
                if (deepStateLayer) map.removeLayer(deepStateLayer); // Вимикаємо фронт на темній карті
            } else { 
                map.removeLayer(darkLayer); 
                lightLayer.addTo(map); 
                btn.innerText = "🌙";
                if (deepStateLayer) deepStateLayer.addTo(map); // Вмикаємо фронт назад
            }
        };

        // --- ГРОМАДИ ---
        let gromadaLayers = [];
        let isGromadaDetectionActive = false;
        fetch('громады если надо.json').then(res => res.json()).then(data => {
            L.geoJson(data, {
                style: { color: "transparent", fillColor: "transparent", fillOpacity: 0, weight: 1, interactive: false },
                onEachFeature: (f, l) => { l._customBounds = l.getBounds(); gromadaLayers.push(l); }
            }).addTo(map);
        });

        window.toggleGromadaDetection = () => {
            isGromadaDetectionActive = !isGromadaDetectionActive;
            const btn = document.getElementById('btn-gromady');
            btn.classList.toggle('active', isGromadaDetectionActive);
            btn.innerText = isGromadaDetectionActive ? "🌐 ГРОМАДИ: ON" : "🌐 ГРОМАДИ: OFF";
            if(!isGromadaDetectionActive) gromadaLayers.forEach(l => l.setStyle({ fillOpacity: 0 }));
        };

        // --- МАСКА ТА ОБЛАСТІ ---
        const world = [[90, -180], [90, 180], [-90, 180], [-90, -180], [90, -180]];
        let maskLayer, activeBorders = L.layerGroup().addTo(map), selectedFeatures = [], allFeatures = [];

        fetch('области.geojson').then(res => res.json()).then(data => {
            allFeatures = data.features;
            const list = document.getElementById('regionsList');
            allFeatures.forEach((f, i) => {
                const div = document.createElement('div');
                div.className = 'setting-item';
                div.innerHTML = `<input type="checkbox" id="reg-${i}"> <label for="reg-${i}">${f.properties.shapeName || `Обл ${i+1}`}</label>`;
                const chk = div.querySelector('input');
                chk.onchange = (e) => {
                    if(e.target.checked) selectedFeatures.push(f);
                    else selectedFeatures = selectedFeatures.filter(item => item !== f);
                    updateMask();
                };
                list.appendChild(div);
            });
        });

        window.toggleAllUkraine = () => {
            const shouldSelectAll = selectedFeatures.length < allFeatures.length;
            selectedFeatures = shouldSelectAll ? [...allFeatures] : [];
            document.querySelectorAll('#regionsList input').forEach(c => c.checked = shouldSelectAll);
            updateMask();
        };

        function updateMask() {
            if (maskLayer) map.removeLayer(maskLayer);
            activeBorders.clearLayers();
            if (selectedFeatures.length === 0) return;
            let maskCoords = [world];
            selectedFeatures.forEach(f => {
                L.geoJson(f, { style: { color: '#FF0000', weight: 2, fill: false, interactive: false } }).addTo(activeBorders);
                let c = f.geometry.coordinates;
                if (f.geometry.type === "Polygon") maskCoords.push(c[0].map(p => [p[1], p[0]]));
                else f.geometry.coordinates.forEach(poly => maskCoords.push(poly[0].map(p => [p[1], p[0]])));
            });
            maskLayer = L.polygon(maskCoords, { color: 'transparent', fillColor: '#1a1a1a', fillOpacity: 0.67, interactive: false }).addTo(map);
        }

        // --- СИНХРОНІЗАЦІЯ ЮНІТІВ ---
        let units = {}; 
        onValue(ref(db, 'live_units'), (snapshot) => {
            const data = snapshot.val() || {};
            Object.keys(units).forEach(id => { 
                if (!data[id]) { map.removeLayer(units[id].marker); map.removeLayer(units[id].line); delete units[id]; } 
            });
            Object.keys(data).forEach(id => {
                const u = data[id];
                if (!units[id]) {
                    const icon = L.divIcon({ className: 'custom-div', html: `<img src="${u.iconUrl}" class="unit-icon" style="transform:rotate(${u.angle}deg)">`, iconSize: [30, 30], iconAnchor: [15, 15] });
                    const marker = L.marker([u.startLat, u.startLng], { icon: icon }).addTo(map);
                    const line = L.polyline([[u.startLat, u.startLng], [u.targetLat || u.startLat, u.targetLng || u.startLng]], { color: 'red', weight: 2, dashArray: '5,5', opacity: 0.5 }).addTo(map);
                    units[id] = { ...u, marker, line };
                    marker.on('click', (ev) => { L.DomEvent.stopPropagation(ev); if (activeMode === 'delete_one') remove(ref(db, `live_units/${id}`)); });
                } else { 
                    Object.assign(units[id], u); 
                    units[id].line.setLatLngs([[u.startLat, u.startLng], [u.targetLat || u.startLat, u.targetLng || u.startLng]]);
                }
            });
        });

        // --- ЦИКЛ РУХУ ТА ПІДСВІТКИ (2 КМ) ---
        setInterval(() => {
            const now = Date.now();
            let shahedCoords = [];
            Object.keys(units).forEach(id => {
                const u = units[id];
                if (!u.targetLat) return;
                const duration = (map.distance(L.latLng(u.startLat, u.startLng), L.latLng(u.targetLat, u.targetLng)) / (u.speed * 1000 / 3600)) * 1000;
                let progress = Math.min((now - u.startTime) / duration, 1);
                const curLat = u.startLat + (u.targetLat - u.startLat) * progress;
                const curLng = u.startLng + (u.targetLng - u.startLng) * progress;
                u.marker.setLatLng([curLat, curLng]);
                u.line.setLatLngs([[curLat, curLng], [u.targetLat, u.targetLng]]);
                if (u.marker.getElement()) u.marker.getElement().querySelector('img').style.transform = `rotate(${u.angle}deg)`;
                if (u.iconUrl === 's1.png') shahedCoords.push(L.latLng(curLat, curLng));
            });

            if (isGromadaDetectionActive) {
                gromadaLayers.forEach(layer => {
                    let active = shahedCoords.some(sPos => layer._customBounds.pad(0.05).contains(sPos) || sPos.distanceTo(layer._customBounds.getCenter()) < 3000);
                    layer.setStyle({ fillOpacity: active ? 0.22 : 0, fillColor: '#ff0000' });
                });
            }
        }, 100);

        // --- КЕРУВАННЯ ---
        let activeMode = null, activeIconUrl = '', activeSpeed = 0, currentUnitId = null;
        window.setActiveMode = (mode, icon, speed) => {
            activeMode = mode; activeIconUrl = icon; activeSpeed = speed; currentUnitId = null;
            document.querySelectorAll('.btn').forEach(b => { if(b.id !== 'btn-gromady') b.classList.remove('active'); });
            const activeBtn = document.getElementById(`btn-${mode === 'delete_one' ? 'delete' : mode}`);
            if (activeBtn) activeBtn.classList.add('active');
        };

        map.on('click', (e) => {
            if (!activeMode || activeMode === 'delete_one') return;
            if (!currentUnitId) {
                const id = "u_" + Date.now();
                set(ref(db, `live_units/${id}`), { id, startLat: e.latlng.lat, startLng: e.latlng.lng, targetLat: 0, targetLng: 0, iconUrl: activeIconUrl, speed: activeSpeed, angle: 0, startTime: Date.now() });
                currentUnitId = id;
            } else {
                const u = units[currentUnitId];
                update(ref(db, `live_units/${currentUnitId}`), { targetLat: e.latlng.lat, targetLng: e.latlng.lng, startTime: Date.now(), angle: 90 - (Math.atan2(e.latlng.lat - u.startLat, e.latlng.lng - u.startLng) * 180 / Math.PI) });
                currentUnitId = null;
            }
        });

        window.clearAllData = () => { if(confirm("Видалити все?")) remove(ref(db, 'live_units')); };
        window.toggleUI = () => document.getElementById('mainUI').classList.toggle('hidden');
        window.toggleSettings = () => document.getElementById('settingsMenu').classList.toggle('active');
    </script>
</body>
</html>
