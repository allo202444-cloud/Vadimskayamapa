<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Адмінка - Fix Version</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }
        #map { height: 100vh; width: 100vw; background: #000; z-index: 1; }
        .ui-element { position: absolute; z-index: 2000; transition: opacity 0.3s; }
        .bottom-left-btns { bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .round-btn { width: 45px; height: 45px; color: white; border: 2px solid #fff; border-radius: 50%; font-weight: 900; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-a { background: #ff0000; }
        .btn-settings { background: #444; font-size: 24px; }
        .settings-panel { top: 10px; left: 10px; width: 180px; max-height: 60vh; background: rgba(0,0,0,0.95); padding: 10px; border-radius: 8px; border: 1px solid #fff; color: white; display: none; overflow-y: auto; z-index: 3000; }
        .controls-panel { top: 10px; right: 10px; width: 150px; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 8px; border: 1px solid #ff0000; display: flex; flex-direction: column; gap: 6px; }
        .hidden { opacity: 0; pointer-events: none; }
        .settings-panel.active { display: block; }
        .btn { background: #1a1a1a; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 10px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; }
        .btn img { width: 18px; height: 18px; }
        .btn.active { background: #ff0000; border-color: #fff; }
        .setting-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 11px; border-bottom: 1px solid #222; padding-bottom: 3px; }
        .unit-icon { display: block; pointer-events: none; width: 30px !important; height: 30px !important; }
        .leaflet-control-zoom { z-index: 500 !important; }
    </style>
</head>
<body>

    <div class="bottom-left-btns ui-element" id="leftBtns">
        <button class="round-btn btn-a" onclick="toggleUI()">A</button>
        <button class="round-btn btn-settings" onclick="toggleSettings()">⚙️</button>
    </div>

    <div class="settings-panel ui-element" id="settingsMenu">
        <h5 style="margin: 0 0 8px 0; color: #ff0000; font-size: 12px; text-align: center;">МЕНЮ ОБЛАСТЕЙ</h5>
        <div id="regionsList">Завантаження...</div>
    </div>

    <div class="controls-panel ui-element" id="mainUI">
        <button class="btn" onclick="setActiveMode('shahed', 's1.png', 185)"><img src="s1.png"> ШАХЕД</button>
        <button class="btn" onclick="setActiveMode('scout', 'orl10.png', 120)"><img src="orl10.png"> РОЗВІДНИК</button>
        <button class="btn" onclick="setActiveMode('kab', 'kab.png', 700)"><img src="kab.png"> КАБ</button>
        <hr style="width:100%; border:0; border-top:1px solid #ff0000; margin: 3px 0; opacity: 0.5;">
        <button class="btn" style="color: #ff4444;" onclick="setActiveMode('delete_one')">ВИДАЛИТИ</button>
        <button class="btn" style="color: #ff4444;" onclick="clearAllData()">ОЧИСТИТИ</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://map-objects-75fa0-default-rtdb.europe-west1.firebasedatabase.app/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const map = L.map('map', { attributionControl: false }).setView([48.30, 34.84], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const world = [[90, -180], [90, 180], [-90, 180], [-90, -180], [90, -180]];
        let maskLayer = null; 
        let activeBorders = L.layerGroup().addTo(map); 
        let selectedFeatures = []; 

        // 1. Завантаження DeepState (без обводки!)
        fetch('deepstatemap_data_20260221.json').then(res => res.json()).then(data => {
            L.geoJson(data, {
                style: { color: "transparent", fillColor: "#ff0000", fillOpacity: 0.4, interactive: false }
            }).addTo(map);
        });

        // Функція оновлення маски
        function updateGlobalMask() {
            if (maskLayer) map.removeLayer(maskLayer);
            activeBorders.clearLayers();

            if (selectedFeatures.length === 0) return;

            let maskCoords = [world];
            selectedFeatures.forEach(feature => {
                // Додаємо обводку
                L.geoJson(feature, { style: { color: '#FF0000', weight: 3, opacity: 1, fill: false, interactive: false } }).addTo(activeBorders);
                
                // Додаємо координати для вирізу в масці
                let fCoords = feature.geometry.coordinates;
                if (feature.geometry.type === "Polygon") {
                    maskCoords.push(fCoords[0].map(c => [c[1], c[0]]));
                } else if (feature.geometry.type === "MultiPolygon") {
                    fCoords.forEach(poly => maskCoords.push(poly[0].map(c => [c[1], c[0]])));
                }
            });

            maskLayer = L.polygon(maskCoords, { color: 'transparent', fillColor: '#1a1a1a', fillOpacity: 0.67, interactive: false }).addTo(map);
        }

        // 2. Завантаження областей
        fetch('области.geojson').then(res => res.json()).then(data => {
            const listContainer = document.getElementById('regionsList');
            listContainer.innerHTML = '';

            data.features.forEach((feature, index) => {
                const name = feature.properties.shapeName || `Область ${index + 1}`;
                createCheckbox(name, feature, listContainer);
            });

            // Вся Україна (об'єднуємо всі фічі)
            const allUkraineBtn = document.createElement('div');
            allUkraineBtn.className = 'setting-item';
            allUkraineBtn.style.borderTop = "2px solid #ff0000";
            allUkraineBtn.innerHTML = `<input type="checkbox"> <label><b>ВСЯ УКРАЇНА</b></label>`;
            const chk = allUkraineBtn.querySelector('input');
            chk.onchange = () => {
                if (chk.checked) selectedFeatures = [...data.features];
                else selectedFeatures = [];
                // Оновлюємо всі інші чекбокси для візуального зв'язку
                listContainer.querySelectorAll('input').forEach(i => i.checked = chk.checked);
                updateGlobalMask();
            };
            listContainer.appendChild(allUkraineBtn);
        });

        function createCheckbox(name, feature, container) {
            const item = document.createElement('div');
            item.className = 'setting-item';
            item.innerHTML = `<input type="checkbox"> <label>${name}</label>`;
            const chk = item.querySelector('input');
            chk.onchange = () => {
                if (chk.checked) selectedFeatures.push(feature);
                else selectedFeatures = selectedFeatures.filter(f => f !== feature);
                updateGlobalMask();
            };
            container.appendChild(item);
        }

        // Управління UI
        window.toggleUI = () => {
            const isHidden = document.getElementById('mainUI').classList.toggle('hidden');
            document.getElementById('settingsMenu').classList.remove('active');
            document.getElementById('leftBtns').children[1].classList.toggle('hidden', isHidden);
        };
        window.toggleSettings = () => document.getElementById('settingsMenu').classList.toggle('active');

        // Логіка цілей (без змін)
        let activeMode = null, activeIconUrl = '', activeSpeed = 0, units = [], currentUnit = null;
        function getAngle(s, e) { const p1 = map.project(s), p2 = map.project(e); return (Math.atan2(p2.y-p1.y, p2.x-p1.x)*180/Math.PI)+90; }
        function sync() { const data = units.map(u => ({ id: u.id, lat: u.pos.lat, lng: u.pos.lng, targetLat: u.target?.lat, targetLng: u.target?.lng, type: u.type, angle: u.angle || 0, iconUrl: u.iconUrl })); set(ref(db, 'live_units'), data); }
        function startFlight(u) { if (u.interval) clearInterval(u.interval); u.interval = setInterval(() => { if (!u.target) return; const dist = map.distance(u.pos, u.target); if (dist < 100) { clearInterval(u.interval); return; } const step = (u.speed * 1000 / 3600) * 0.05; const ratio = step / dist; u.pos = L.latLng(u.pos.lat + (u.target.lat - u.pos.lat) * ratio, u.pos.lng + (u.target.lng - u.pos.lng) * ratio); updateVisuals(u); sync(); }, 50); }
        window.setActiveMode = (m, i, s) => { activeMode = m; activeIconUrl = i; activeSpeed = s; currentUnit = null; document.querySelectorAll('.btn').forEach(b => b.classList.remove('active')); if(window.event) window.event.currentTarget.classList.add('active'); };
        window.clearAllData = () => { if(confirm("Очистити все?")) { units.forEach(u => { clearInterval(u.interval); map.removeLayer(u.marker); map.removeLayer(u.line); }); units = []; sync(); } };
        map.on('click', (e) => { if (activeMode === 'delete_one' || !activeMode) return; if (activeIconUrl && !currentUnit) { const newUnit = { id: Date.now(), pos: e.latlng, target: null, type: activeMode, iconUrl: activeIconUrl, angle: 0, speed: activeSpeed }; addMarker(newUnit); units.push(newUnit); currentUnit = newUnit; } else if (currentUnit) { currentUnit.target = e.latlng; currentUnit.angle = getAngle(currentUnit.pos, currentUnit.target); startFlight(currentUnit); currentUnit = null; } });
        function addMarker(u) { const icon = L.divIcon({ className: 'custom-div', html: `<img src="${u.iconUrl}" class="unit-icon" style="transform:rotate(${u.angle}deg)">`, iconSize: [30, 30], iconAnchor: [15, 15] }); u.marker = L.marker(u.pos, { icon: icon, draggable: true }).addTo(map); u.line = L.polyline([u.pos, u.target || u.pos], { color: 'red', weight: 2, dashArray: '5,5', opacity: 0.6 }).addTo(map); u.marker.on('drag', (e) => { u.pos = e.latlng; if (u.target) u.angle = getAngle(u.pos, u.target); updateVisuals(u); }); u.marker.on('dragend', () => { if(u.target) startFlight(u); sync(); }); u.marker.on('click', (ev) => { L.DomEvent.stopPropagation(ev); if (activeMode === 'delete_one') { clearInterval(u.interval); map.removeLayer(u.marker); map.removeLayer(u.line); units = units.filter(i => i.id !== u.id); sync(); } else { currentUnit = u; } }); }
        function updateVisuals(u) { u.marker.setLatLng(u.pos); u.line.setLatLngs([u.pos, u.target || u.pos]); const img = u.marker.getElement()?.querySelector('img'); if (img) img.style.transform = `rotate(${u.angle}deg)`; }
    </script>
</body>
</html>
